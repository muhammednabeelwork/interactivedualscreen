<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Screen Display</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Double-buffered video players for seamless cross-fades */
        .display-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 1;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .display-video.active {
            opacity: 1;
            z-index: 2;
        }

        /* Ambient glowing frame for a premium look */
        #ambient-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8);
            transition: box-shadow 0.8s ease;
        }

        /* Active zone-specific atmospheric ambient glows */
        body[data-active-zone="1"] #ambient-glow {
            box-shadow: inset 0 0 80px rgba(0, 229, 255, 0.15), inset 0 0 150px rgba(0, 0, 0, 0.6);
        }
        body[data-active-zone="2"] #ambient-glow {
            box-shadow: inset 0 0 80px rgba(213, 0, 249, 0.15), inset 0 0 150px rgba(0, 0, 0, 0.6);
        }
        body[data-active-zone="3"] #ambient-glow {
            box-shadow: inset 0 0 80px rgba(255, 214, 0, 0.12), inset 0 0 150px rgba(0, 0, 0, 0.6);
        }
        body[data-active-zone="4"] #ambient-glow {
            box-shadow: inset 0 0 80px rgba(0, 230, 118, 0.15), inset 0 0 150px rgba(0, 0, 0, 0.6);
        }

        /* Sleek Status / Connection overlay */
        #display-status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        #display-status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ff5252;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff5252;
            transition: all 0.3s ease;
        }

        #display-status.connected {
            color: rgba(255, 255, 255, 0.8);
        }

        #display-status.connected::before {
            background: #00E676;
            box-shadow: 0 0 8px #00E676;
        }

        /* Debug / Control Panel (Hidden by default, shown if launched directly) */
        #debug-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        #debug-panel h3 {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #00E5FF;
        }

        .debug-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .debug-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Large gesture invitation overlay if browser blocks autoplay */
        #interaction-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        #interaction-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #interaction-overlay h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 400;
        }

        #interaction-overlay p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .play-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #00E5FF;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div id="interaction-overlay">
        <div class="play-icon">▶</div>
        <h1>Click to Initialize Display</h1>
        <p>This activates audio and fullscreen capabilities</p>
    </div>

    <div id="ambient-glow"></div>

    <video id="video-a" class="display-video active" playsinline></video>
    <video id="video-b" class="display-video" playsinline></video>

    <div id="debug-panel">
        <h3>Local Simulator Controls</h3>
        <button class="debug-btn" id="btn-unmute">Toggle Audio</button>
    </div>

    <script src="big_screen.js"></script>
</body>
</html>
